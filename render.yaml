services:
  - type: web
    name: nyayarakshak-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MTALKZ_API_KEY
        sync: false
      - key: MTALKZ_SENDER_ID
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
